<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>我的编程实验室</title>
    <style>
        /* 极致干净明亮的现代主页风格 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #1e293b;
        }

        .container {
            text-align: center;
            background: white;
            padding: 70px 100px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            border: 1px solid #e2e8f0;
        }

        h1 {
            font-size: 42px;
            color: #1e293b;
            margin-top: 0;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        h1 span {
            color: #3b82f6; /* 品牌蓝 */
        }

        p {
            font-size: 18px;
            color: #64748b;
            margin-bottom: 50px;
        }

        /* 呼吸感立体大按钮 */
        .big-btn {
            display: inline-block;
            background-color: #3b82f6;
            color: white;
            text-decoration: none;
            font-size: 22px;
            font-weight: bold;
            padding: 20px 60px;
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .big-btn:hover {
            background-color: #2563eb;
            transform: translateY(-5px); /* 悬浮时往上抬起 */
            box-shadow: 0 20px 35px rgba(59, 130, 246, 0.4);
        }

        .big-btn:active {
            transform: translateY(2px); /* 点击时往下压 */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>探索 <span>代码</span> 与 <span>逻辑</span> 的世界</h1>
        <p>个人专属的计算机科学互动学习枢纽</p>
        
        <a href="dsa.html" class="big-btn">进入 DSA 学习室</a>
    </div>

</body>
</html>
