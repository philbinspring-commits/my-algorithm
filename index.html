<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>机器学习实验室 - 线性回归</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0fdf4; /* 换了一个带有 AI 科技感的极淡绿色背景 */
            display: flex;
            justify-content: center;
            padding-top: 40px;
            padding-bottom: 40px;
            margin: 0;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 30px;
            width: 900px;
        }

        .header { text-align: center; margin-bottom: 30px; }

        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #f8fafc;
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            margin-bottom: 20px;
        }

        .btn {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-right: 10px;
        }
        .btn:hover { background-color: #2563eb; }
        .btn:disabled { background-color: #9ca3af; cursor: not-allowed; }
        
        .btn-run { background-color: #8b5cf6; } /* AI 训练按钮用神秘的紫色 */
        .btn-run:hover { background-color: #7c3aed; }

        .stat-box {
            font-family: monospace;
            font-size: 16px;
            font-weight: bold;
            color: #ef4444; /* 红色显示误差 */
            background: #fee2e2;
            padding: 8px 15px;
            border-radius: 6px;
        }

        #chart-container { width: 100%; height: 400px; }

        .terminal {
            background-color: #0f172a;
            color: #38bdf8;
            font-family: 'Courier New', Courier, monospace;
            padding: 15px;
            border-radius: 12px;
            height: 150px;
            overflow-y: auto;
            margin-top: 20px;
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.3);
            font-size: 14px;
            line-height: 1.5;
        }
        .terminal span.highlight { color: #facc15; }
        .terminal span.error { color: #f87171; }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <h1 style="margin:0; color:#1e293b;">🧠 机器学习：线性回归 (Linear Regression)</h1>
            <p style="color: #64748b; margin-top:8px;">观察 AI 是如何通过“梯度下降”找到最优直线的</p>
        </div>
        
        <div class="control-panel">
            <div>
                <button id="btn-gen" class="btn" onclick="generateScatterData()">🌌 生成散点数据</button>
                <button id="btn-start" class="btn btn-run" onclick="trainModel()">🚀 开始训练模型</button>
            </div>
            <div class="stat-box" id="loss-display">误差 (Loss): 待计算</div>
        </div>

        <div id="chart-container"></div>

        <div class="terminal" id="log-box">
            <div>> AI 核心已启动，等待载入数据集...</div>
        </div>
    </div>

    <script>
        let chart = echarts.init(document.getElementById('chart-container'));
        let dataPoints = []; // 存放我们二维坐标系里的 [x, y] 点
        
        // 机器学习的核心参数：直线的斜率 (w) 和 截距 (b)
        // 方程式： y = w * x + b
        let w = 0; 
        let b = 0; 
        let isTraining = false;

        // --- 终端日志模块 ---
        function writeLog(message) {
            let logBox = document.getElementById("log-box");
            logBox.innerHTML += `<div>> ${message}</div>`;
            logBox.scrollTop = logBox.scrollHeight; 
        }

        function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

        // --- 数据生成模块 ---
        function generateScatterData() {
            if(isTraining) return;
            dataPoints = [];
            // 我们悄悄设定一个“真实规律”：y 约等于 3x + 5，并加上一些随机波动（噪声）
            for (let i = 0; i < 40; i++) {
                let x = Math.random() * 10; // x 在 0 到 10 之间
                let noise = (Math.random() - 0.5) * 10; // 上下波动的噪音
                let y = 3 * x + 5 + noise;
                dataPoints.push([x, y]);
            }
            
            // 数据生成后，重置模型的参数（归零）
            w = 0; 
            b = 0; 
            document.getElementById("loss-display").innerText = "误差 (Loss): 等待训练";
            renderChart();
            writeLog("载入二维散点数据成功，共 40 个样本。当前 AI 参数重置为初始状态。");
        }

        // --- 核心可视化：把散点和直线画出来 ---
        function renderChart() {
            // 根据当前的 w 和 b，计算直线的起点(x=0)和终点(x=10)
            let lineStart = [0, w * 0 + b];
            let lineEnd = [10, w * 10 + b];

            let option = {
                xAxis: { type: 'value', min: 0, max: 10 }, // X轴 0到10
                yAxis: { type: 'value', min: 0, max: 50 }, // Y轴 0到50
                animation: false, // 关闭 ECharts 默认动画，我们要用代码自己控制每一帧！
                series: [
                    {
                        name: '历史数据',
                        type: 'scatter', // 散点图
                        data: dataPoints,
                        itemStyle: { color: '#3b82f6' },
                        symbolSize: 8
                    },
                    {
                        name: 'AI 预测线',
                        type: 'line', // 直线
                        data: [lineStart, lineEnd],
                        lineStyle: { color: '#8b5cf6', width: 4 }, // 骚气的紫色
                        markPoint: { data: [{ type: 'max', name: 'Max' }] }
                    }
                ]
            };
            chart.setOption(option);
        }

        // --- AI 核心引擎：梯度下降法 (Gradient Descent) ---
        async function trainModel() {
            if (isTraining || dataPoints.length === 0) return;
            isTraining = true;
            document.getElementById("btn-gen").disabled = true;
            document.getElementById("btn-start").disabled = true;

            writeLog("<span class='highlight'>[启动梯度下降引擎] 学习率(Learning Rate): 0.01</span>");

            let learningRate = 0.01; // AI 每次跨步的大小
            let epochs = 50; // 训练 50 轮

            for (let epoch = 1; epoch <= epochs; epoch++) {
                let totalError = 0;
                let gradientW = 0;
                let gradientB = 0;
                let N = dataPoints.length;

                // 1. 遍历所有点，计算当前的误差和梯度（方向）
                for (let i = 0; i < N; i++) {
                    let x = dataPoints[i][0];
                    let y = dataPoints[i][1];
                    
                    let prediction = w * x + b; // AI 当前的预测值
                    let error = prediction - y; // 预测值和真实值的差距
                    
                    totalError += error * error; // 统计总误差（平方是为了去掉负号）
                    
                    // 计算偏导数（微积分魔法，用来指引直线的调整方向）
                    gradientW += (2 / N) * x * error;
                    gradientB += (2 / N) * error;
                }

                let mse = totalError / N; // 均方误差 (Mean Squared Error)

                // 2. 根据梯度，调整 w 和 b 的值（这就是机器“学习”的过程）
                w = w - learningRate * gradientW;
                b = b - learningRate * gradientB;

                // 3. 更新界面
                document.getElementById("loss-display").innerText = `误差 (Loss): ${mse.toFixed(2)}`;
                renderChart();
                
                if (epoch % 5 === 0) { // 每隔 5 轮在终端打印一次进度
                    writeLog(`Epoch ${epoch}/50: 调整参数 -> W=${w.toFixed(2)}, B=${b.toFixed(2)} | <span class='error'>Loss=${mse.toFixed(2)}</span>`);
                }

                await sleep(100); // 暂停0.1秒，产生丝滑的动画效果
            }

            writeLog("<span class='highlight'>🎉 训练完成！直线已完美拟合数据。</span>");
            isTraining = false;
            document.getElementById("btn-gen").disabled = false;
            document.getElementById("btn-start").disabled = false;
        }

        // 网页打开时自动生成数据
        generateScatterData();
    </script>
</body>
</html>
